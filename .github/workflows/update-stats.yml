name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:        # lets you trigger it manually anytime

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch stats SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=anuj990&show_icons=true&theme=tokyonight&count_private=true" -o stats.svg

      - name: Fetch tech stack SVG (optional, skip if not needed)
        run: |
          curl -s "https://skillicons.dev/icons?i=androidstudio,kotlin,cpp,python,firebase,git,github,vscode,linux" -o skills.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg skills.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update stats svg" && git push)
